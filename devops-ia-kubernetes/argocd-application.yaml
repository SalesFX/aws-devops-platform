apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-ia
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SalesFX/aws-devops-platform.git
    targetRevision: main
    path: devops-ia-kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
